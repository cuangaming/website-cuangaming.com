<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CuanGaming • Testimoni</title>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>

*{box-sizing:border-box;margin:0;padding:0;}

body{
font-family:"Poppins",sans-serif;
background:url('https://raw.githubusercontent.com/cuangaming/funbot/main/testimonicuan.jpg') no-repeat center center fixed;
background-size:cover;
color:#1a1a3f;
}

/* HEADER */

header{
background:rgba(255,255,255,0.8);
display:flex;
align-items:center;
justify-content:space-between;
padding:8px 16px;
border-radius:10px;
}

header img{
height:48px;
}

.header-buttons{
display:flex;
gap:10px;
}

.header-buttons a{
background:#1a1a3f;
padding:6px 12px;
border-radius:10px;
color:#fff;
font-size:.85em;
text-decoration:none;
}

/* CONTAINER */

.container{
max-width:900px;
margin:40px auto;
padding:20px;
}

/* FACEBOOK */

.fb-embed{
display:flex;
justify-content:center;
margin-bottom:30px;
}

.fb-embed iframe{
width:700px;
max-width:100%;
border-radius:10px;
border:none;
}

/* TESTIMONI */

.card{
background:rgba(255,255,255,0.9);
padding:20px;
border-radius:14px;
}

.carousel{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
margin-bottom:20px;
}

.testi{
background:#1a1a3f;
color:#fff;
padding:10px;
border-radius:10px;
font-size:.9em;
}

/* FORM */

form{
display:flex;
flex-direction:column;
gap:10px;
}

input,textarea{
padding:10px;
border-radius:6px;
border:1px solid #ccc;
}

button{
background:#1a1a3f;
color:#fff;
border:none;
padding:10px;
border-radius:6px;
cursor:pointer;
}

/* FOOTER */

footer{
text-align:center;
padding:12px;
font-size:.85em;
background:rgba(255,255,255,0.8);
color:#777;
border-radius:10px;
margin:20px;
}

</style>
</head>

<body>

<header>

<a href="index.html">
<img src="https://raw.githubusercontent.com/cuangaming/funbot/main/Cuan%20Logo%20(1)%20copy%20fit.png">
</a>

<div class="header-buttons">
<a href="https://www.facebook.com/lidwinalaurenza/subscribe">Daftar Reseller</a>
<a href="hubungi.html">Hubungi Kami</a>
</div>

</header>

<div class="container">

<div class="fb-embed">

<iframe
src="https://www.facebook.com/plugins/post.php?href=https%3A%2F%2Fwww.facebook.com%2Flidwinalaurenza%2Fposts%2Fpfbid026DmJ4XZUPwWrbAz7nWdDHjdsmMJoBTZTQspzjkLRk7T3VCK16Bgz4NZcSef3y4xTl&show_text=true"
height="630">
</iframe>

</div>

<div class="card">

<div class="carousel" id="testimoniList"></div>

<form id="formTesti">

<input type="text" id="nama" placeholder="Nama kamu" required>

<textarea id="komen" placeholder="Tulis testimoni..." required></textarea>

<button type="submit">Kirim Testimoni</button>

</form>

</div>

</div>

<footer>
© 2025 CuanGaming. All rights reserved.
</footer>

<script>

/* SUPABASE */

const { createClient } = supabase

const supabaseClient = createClient(
"https://dooqhxywmjwtlsodgplz.supabase.co",
"sb_publishable_CkbvV7KamxpSa8aPFWK-gw_pim1oq1V"
)

/* LOAD TESTIMONI */

async function loadTestimoni(){

const { data, error } = await supabaseClient
.from('testimoni')
.select('*')
.order('created_at',{ascending:false})

if(error){
console.log(error)
return
}

const list=document.getElementById("testimoniList")
list.innerHTML=""

data.forEach(item=>{

const div=document.createElement("div")
div.className="testi"

div.innerHTML=`
<strong>${item.nama}</strong>
<p>${item.komen}</p>
`

list.appendChild(div)

})

}

loadTestimoni()

/* KIRIM TESTIMONI */

document.getElementById("formTesti")
.addEventListener("submit",async(e)=>{

e.preventDefault()

const nama=document.getElementById("nama").value
const komen=document.getElementById("komen").value

const { error } = await supabaseClient
.from("testimoni")
.insert([{nama,komen}])

if(error){

alert("Gagal kirim testimoni")

}else{

alert("Testimoni berhasil dikirim!")

document.getElementById("nama").value=""
document.getElementById("komen").value=""

loadTestimoni()

}

})

</script>

</body>
</html>
