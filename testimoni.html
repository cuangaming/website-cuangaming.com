<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CuanGaming • Testimoni</title>
<style>
* {box-sizing:border-box;margin:0;padding:0;}
body {
  font-family:"Poppins", sans-serif;
  background: url('https://raw.githubusercontent.com/cuangaming/funbot/main/testimonicuan.jpg') no-repeat center center fixed;
  background-size: cover;
  color:#1a1a3f;
}

/* ===== Header ===== */
header {
  background: rgba(255,255,255,0.8); /* sedikit transparan agar logo & tombol tetap jelas */
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 16px;
  border-bottom: 1px solid #ddd;
  border-radius:10px;
}
header .logo img { height: 48px; width: auto; cursor:pointer; }
.header-buttons { display:flex; gap:10px; }
.header-buttons a {
  background: #1a1a3f; padding:6px 12px; border-radius:10px;
  color:#fff; font-weight:600; font-size:0.85em; text-decoration:none; transition:0.3s;
}
.header-buttons a:hover { transform:scale(1.05); background:#333366; }

/* ===== Row utama ===== */
.container { max-width:1200px; margin:20px auto; padding:0 16px; }
.row { display:flex; flex-wrap:wrap; gap:20px; margin-top:20px; }
.col { flex:1 1 300px; }

/* ===== Facebook Embed ===== */
.fb-embed iframe { width:100%; border:none; overflow:hidden; border-radius:10px; }

/* ===== Carousel Grid 2x2 ===== */
.carousel-wrapper {
  width: 420px; 
  display: grid;
  grid-template-columns: repeat(2, 200px);
  grid-template-rows: repeat(2, 200px);
  gap: 10px;
  margin-bottom: 20px;
}
.carousel-item {
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  padding:10px;
  text-align:center;
  font-size:0.85rem;
  overflow:hidden;
  color:#fff;
  text-shadow: 1px 1px 4px rgba(0,0,0,0.7);
}

/* ===== Form ===== */
form {
  display:flex;
  flex-direction:column;
  max-width:420px; 
}
form input, form textarea {
  margin:5px 0; padding:10px; font-size:1rem; border:1px solid #ccc; border-radius:4px;
}
form button {
  padding:10px; background:#1a1a3f; color:#fff; border:none; border-radius:4px;
  cursor:pointer; transition:0.3s;
}
form button:hover { background:#333366; }

/* ===== Footer Icons ===== */
.footer-icons { display:flex; flex-wrap:wrap; justify-content:center; margin:30px 0; gap:20px; }
.footer-icons .func-btn { width:200px; height:200px; text-align:center; cursor:pointer; transition:transform 0.2s; }
.footer-icons .func-btn img { width:100%; height:auto; display:block; margin:0 auto; }
.footer-icons .func-btn span { display:block; margin-top:5px; font-weight:700; color:#fff; text-shadow: 1px 1px 4px rgba(0,0,0,0.7);}
.footer-icons .func-btn:hover { transform:scale(1.05); }

/* ===== Mobile ===== */
@media(max-width:768px){
  .row { flex-direction:column; align-items:center; }
  .carousel-wrapper, form { max-width:100%; grid-template-columns: 1fr 1fr; grid-template-rows: auto auto; gap:10px; }
  .carousel-item { width:100%; height:auto; }
}
</style>
</head>
<body>

<header>
  <div class="logo">
    <a href="index.html"><img src="https://raw.githubusercontent.com/cuangaming/funbot/main/Cuan%20Logo%20(1)%20copy%20fit.png" alt="Cuan Logo"></a>
  </div>
  <div class="header-buttons">
    <a href="#">Daftar Reseller</a>
    <a href="#">Hubungi Kami</a>
  </div>
</header>

<div class="container">

  <div class="row">
    <!-- Kiri: Facebook Embed -->
    <div class="col fb-embed">
      <iframe src="https://www.facebook.com/plugins/post.php?href=https%3A%2F%2Fwww.facebook.com%2Flidwinalaurenza%2Fposts%2Fpfbid026DmJ4XZUPwWrbAz7nWdDHjdsmMJoBTZTQspzjkLRk7T3VCK16Bgz4NZcSef3y4xTl&show_text=true&width=500"
        width="100%" height="631" scrolling="no" frameborder="0" allowfullscreen></iframe>
    </div>

    <!-- Kanan: Carousel 2x2 + Form -->
    <div class="col">
      <!-- Carousel 2x2 -->
      <div class="carousel-wrapper" id="carouselWrapper"></div>

      <!-- Form -->
      <form id="formTestimoni" onsubmit="tambahTestimoni(); return false;">
        <input type="text" id="nama" placeholder="Nama kamu" required>
        <textarea id="komentar" placeholder="Tulis testimoni" required></textarea>
        <button type="submit">Kirim Testimoni</button>
      </form>
    </div>
  </div>

  <!-- Footer Icons -->
  <div class="footer-icons">
    <a class="func-btn" href="https://www.cuangaming.store" target="_blank">
      <img src="https://raw.githubusercontent.com/cuangaming/funbot/main/topupgame.png" alt="Topup Game 24/7">
      <span>Topup Game 24/7</span>
    </a>
    <a class="func-btn" href="https://api.whatsapp.com/send/?phone=6285158779301&text=stock&type=phone_number&app_absent=0" target="_blank">
      <img src="https://raw.githubusercontent.com/cuangaming/funbot/main/ugphone.png" alt="Beli UGPhone">
      <span>Beli UGPhone</span>
    </a>
  </div>

</div>

<script>
const carouselWrapper = document.getElementById('carouselWrapper');
let carouselData = [];
let carouselIndex = 0;

// Fetch testimoni
fetch('https://raw.githubusercontent.com/cuangaming/funbot/main/testimoni.json')
  .then(res => res.json())
  .then(data => {
    carouselData = data;
    renderCarousel();
    setInterval(nextCarousel, 5000);
  });

// Render 4 testimoni per slide
function renderCarousel(){
  carouselWrapper.innerHTML = '';
  for(let i=0;i<4;i++){
    const item = carouselData[(carouselIndex+i) % carouselData.length];
    const div = document.createElement('div');
    div.className='carousel-item';
    div.innerHTML=`<strong>${item.nama}</strong><p>${item.komen}</p>`;
    carouselWrapper.appendChild(div);
  }
}

// Next slide
function nextCarousel(){
  carouselIndex = (carouselIndex + 4) % carouselData.length;
  renderCarousel();
}

// Submit testimoni
function tambahTestimoni(){
  const nama = document.getElementById('nama').value;
  const komentar = document.getElementById('komentar').value;
  if(!nama || !komentar){ alert("Isi nama & komentar!"); return; }

  fetch('https://testimoni-xi.vercel.app/tambah-testimoni',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({nama, komen:komentar})
  })
  .then(res=>res.json())
  .then(data=>{
    if(data.success){
      alert(data.message);
      document.getElementById('nama').value='';
      document.getElementById('komentar').value='';
    } else { alert('Gagal menambahkan testimoni!'); }
  }).catch(err=>{
    console.error(err);
    alert('Terjadi error!');
  });
}
</script>

</body>
</html>
