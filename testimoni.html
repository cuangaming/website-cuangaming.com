<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CuanGaming • Testimoni</title>

<style>

*{box-sizing:border-box;margin:0;padding:0;}

body{
font-family:"Poppins",sans-serif;
background:url('https://raw.githubusercontent.com/cuangaming/funbot/main/testimonicuan.jpg') no-repeat center center fixed;
background-size:cover;
color:#1a1a3f;
}

/* ===== HEADER ===== */

header{
background:rgba(255,255,255,0.8);
display:flex;
align-items:center;
justify-content:space-between;
padding:8px 16px;
border-bottom:1px solid #ddd;
border-radius:10px;
}

header .logo img{
height:48px;
cursor:pointer;
}

.header-buttons{
display:flex;
gap:10px;
}

.header-buttons a{
background:#1a1a3f;
padding:6px 12px;
border-radius:10px;
color:#fff;
font-weight:600;
font-size:.85em;
text-decoration:none;
transition:0.3s;
}

.header-buttons a:hover{
transform:scale(1.05);
background:#333366;
}

/* ===== CONTAINER ===== */

.container{
max-width:1200px;
margin:30px auto;
padding:0 16px;
}

.row{
display:flex;
flex-wrap:wrap;
gap:25px;
}

/* ===== FACEBOOK EMBED ===== */

.fb-embed iframe{
width:100%;
border:none;
border-radius:10px;
}

/* ===== CARD BOX ===== */

.card{
background:rgba(255,255,255,0.9);
padding:20px;
border-radius:14px;
}

/* ===== CAROUSEL ===== */

.carousel-wrapper{
display:grid;
grid-template-columns:repeat(2,1fr);
grid-template-rows:repeat(2,1fr);
gap:10px;
margin-bottom:20px;
}

.carousel-item{
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
padding:10px;
text-align:center;
font-size:.85rem;
color:#fff;
background:rgba(0,0,0,0.6);
border-radius:10px;
text-shadow:1px 1px 4px rgba(0,0,0,0.7);
}

/* ===== FORM ===== */

form{
display:flex;
flex-direction:column;
gap:10px;
}

form input,
form textarea{
padding:10px;
font-size:0.95rem;
border:1px solid #ccc;
border-radius:6px;
}

form button{
padding:10px;
background:#1a1a3f;
color:#fff;
border:none;
border-radius:6px;
cursor:pointer;
transition:0.3s;
}

form button:hover{
background:#333366;
}

/* ===== ICON MENU ===== */

.footer-icons{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
margin:40px 0;
}

.func-btn{
width:160px;
text-align:center;
transition:0.2s;
}

.func-btn img{
width:100%;
border-radius:12px;
}

.func-btn span{
display:block;
margin-top:5px;
font-weight:700;
color:#fff;
text-shadow:1px 1px 4px rgba(0,0,0,0.7);
}

.func-btn:hover{
transform:scale(1.05);
}

/* ===== MOBILE ===== */

@media(max-width:768px){

.row{
flex-direction:column;
}

.carousel-wrapper{
grid-template-columns:1fr 1fr;
}

}

</style>
</head>

<body>

<header>

<div class="logo">
<a href="index.html">
<img src="https://raw.githubusercontent.com/cuangaming/funbot/main/Cuan%20Logo%20(1)%20copy%20fit.png">
</a>
</div>

<div class="header-buttons">
<a href="https://www.facebook.com/lidwinalaurenza/subscribe">Daftar Reseller</a>
<a href="hubungi.html">Hubungi Kami</a>
</div>

</header>

<div class="container">

<div class="row">

<!-- FACEBOOK -->
<div class="card fb-embed">
<iframe src="https://www.facebook.com/plugins/post.php?href=https%3A%2F%2Fwww.facebook.com%2Flidwinalaurenza%2Fposts%2Fpfbid026DmJ4XZUPwWrbAz7nWdDHjdsmMJoBTZTQspzjkLRk7T3VCK16Bgz4NZcSef3y4xTl&show_text=true&width=500"
height="630" scrolling="no"></iframe>
</div>

<!-- TESTIMONI + FORM -->
<div class="card">

<div class="carousel-wrapper" id="carouselWrapper"></div>

<form id="formTestimoni" onsubmit="tambahTestimoni(); return false;">
<input type="text" id="nama" placeholder="Nama kamu" required>
<textarea id="komentar" placeholder="Tulis testimoni" required></textarea>
<button type="submit">Kirim Testimoni</button>
</form>

</div>

</div>

<!-- MENU ICON -->

<div class="footer-icons">

<a class="func-btn" href="https://www.cuangaming.store" target="_blank">
<img src="https://raw.githubusercontent.com/cuangaming/funbot/main/topupgame.png">
<span>Topup Game 24/7</span>
</a>

<a class="func-btn" href="ugphone.html">
<img src="https://raw.githubusercontent.com/cuangaming/funbot/main/ugphone.png">
<span>Beli UGPhone</span>
</a>

</div>

</div>

<script>

const carouselWrapper=document.getElementById('carouselWrapper');
let carouselData=[];
let carouselIndex=0;

fetch('https://raw.githubusercontent.com/cuangaming/funbot/main/testimoni.json')
.then(res=>res.json())
.then(data=>{
carouselData=data;
renderCarousel();
setInterval(nextCarousel,5000);
});

function renderCarousel(){
carouselWrapper.innerHTML='';
for(let i=0;i<4;i++){
const item=carouselData[(carouselIndex+i)%carouselData.length];
const div=document.createElement('div');
div.className='carousel-item';
div.innerHTML=`<strong>${item.nama}</strong><p>${item.komen}</p>`;
carouselWrapper.appendChild(div);
}
}

function nextCarousel(){
carouselIndex=(carouselIndex+4)%carouselData.length;
renderCarousel();
}

function tambahTestimoni(){

const nama=document.getElementById('nama').value;
const komentar=document.getElementById('komentar').value;

if(!nama||!komentar){
alert("Isi nama & komentar!");
return;
}

fetch('https://testimoni-xi.vercel.app/tambah-testimoni',{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({nama, komen:komentar})
})
.then(res=>res.json())
.then(data=>{
if(data.success){
alert(data.message);
document.getElementById('nama').value='';
document.getElementById('komentar').value='';
}else{
alert('Gagal menambahkan testimoni!');
}
})
.catch(err=>{
console.error(err);
alert('Terjadi error!');
});

}

</script>

</body>
</html>
