<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cuan Gaming - Testimoni</title>
<style>
body {margin:0;font-family:Arial,sans-serif;background:#fff;color:#001f3f;}
header {display:flex;justify-content:space-between;align-items:center;padding:10px 20px;background:#fff;box-shadow:0 2px 5px rgba(0,0,0,0.1);}
header img {height:50px;}
header .buttons button {margin-left:10px;padding:5px 10px;font-size:0.9rem;cursor:pointer;}

.container {max-width:1200px;margin:0 auto;padding:20px;}
.row {display:flex;flex-wrap:wrap;margin-bottom:20px;}
.col {flex:1 1 300px;margin:10px;}
iframe {width:100%;border:none;overflow:hidden;}

.carousel {overflow:hidden;position:relative;margin-bottom:20px;}
.carousel-slide {display:flex;transition:transform 0.5s ease-in-out;}
.carousel-item {min-width:25%;box-sizing:border-box;padding:10px;text-align:left;background:#f8f8f8;margin:5px;border-radius:5px;}

form {margin-top:0;display:flex;flex-direction:column;}
form input, form textarea {margin:5px 0;padding:8px;font-size:1rem;border:1px solid #ccc;border-radius:4px;}
form button {padding:10px;background:#001f3f;color:#fff;border:none;border-radius:4px;cursor:pointer;transition:background 0.3s;}
form button:hover {background:#003366;}

.footer-icons {display:flex;flex-wrap:wrap;justify-content:center;margin:20px 0;}
.footer-icons .func-btn {width:240px;height:240px;margin:10px;text-align:center;cursor:pointer;transition:transform 0.2s;}
.footer-icons .func-btn img {width:240px;height:240px;display:block;margin:0 auto;}
.footer-icons .func-btn span {display:block;margin-top:5px;font-weight:bold;color:#001f3f;}
.footer-icons .func-btn:hover {transform:scale(1.05);}

@media (max-width:768px){
  .row {flex-direction:column;}
  .carousel-item {min-width:50%;}
  .footer-icons .func-btn {width:45%;height:auto;}
  .footer-icons .func-btn img {width:100%;height:auto;}
}
</style>
</head>
<body>

<header>
  <img src="https://raw.githubusercontent.com/cuangaming/funbot/main/Cuan%20Logo%20(1)%20copy%20fit.png" alt="Cuan Gaming">
  <div class="buttons">
    <button>Daftar Reseller</button>
    <button>Hubungi Kami</button>
  </div>
</header>

<div class="container">

  <!-- Baris 1: Facebook embed kiri | Carousel kanan -->
  <div class="row">
    <div class="col fb-embed">
      <iframe src="https://www.facebook.com/plugins/post.php?href=https%3A%2F%2Fwww.facebook.com%2Flidwinalaurenza%2Fposts%2Fpfbid026DmJ4XZUPwWrbAz7nWdDHjdsmMJoBTZTQspzjkLRk7T3VCK16Bgz4NZcSef3y4xTl&show_text=true&width=500" width="100%" height="631" scrolling="no" frameborder="0" allowfullscreen></iframe>
    </div>
    <div class="col">
      <div class="carousel" id="carousel">
        <div class="carousel-slide" id="carouselSlide"></div>
      </div>

      <!-- Form di bawah carousel -->
      <form id="formTestimoni" onsubmit="tambahTestimoni(); return false;">
        <input type="text" id="nama" placeholder="Nama kamu" required>
        <textarea id="komentar" placeholder="Tulis testimoni" required></textarea>
        <button type="submit">Kirim Testimoni</button>
      </form>
    </div>
  </div>

  <!-- Footer icon -->
  <div class="footer-icons">
    <div class="func-btn"><img src="https://raw.githubusercontent.com/cuangaming/funbot/main/topupgame.png"><span>Topup Game 24/7</span></div>
    <div class="func-btn"><img src="https://raw.githubusercontent.com/cuangaming/funbot/main/ugphone.png"><span>Beli UGPhone</span></div>
  </div>

</div>

<script>
  // Carousel 4 testi per slide
  const carouselSlide = document.getElementById('carouselSlide');
  fetch('https://raw.githubusercontent.com/cuangaming/funbot/main/testimoni.json')
    .then(res => res.json())
    .then(data => {
      data.forEach(t => {
        let div = document.createElement('div');
        div.className='carousel-item';
        div.innerHTML=`<strong>${t.nama}</strong><p>${t.komen}</p>`;
        carouselSlide.appendChild(div);
      });

      let idx = 0;
      const itemsPerSlide = 4;
      const totalItems = data.length;
      setInterval(()=>{
        let shift = (idx*100)/itemsPerSlide;
        carouselSlide.style.transform = `translateX(-${shift}%)`;
        idx = (idx + itemsPerSlide) % totalItems;
      },5000);
    });

  // Submit testimoni ke backend
  function tambahTestimoni(){
    const nama = document.getElementById('nama').value;
    const komentar = document.getElementById('komentar').value;
    if(!nama || !komentar){ alert("Isi nama & komentar!"); return; }

    fetch('https://testimoni-xi.vercel.app/tambah-testimoni',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({nama, komen:komentar})
    })
    .then(res=>res.json())
    .then(data=>{
      if(data.success){
        alert(data.message);
        document.getElementById('nama').value='';
        document.getElementById('komentar').value='';
      } else {
        alert('Gagal menambahkan testimoni!');
      }
    }).catch(err=>{
      console.error(err);
      alert('Terjadi error!');
    });
  }
</script>

</body>
</html>
