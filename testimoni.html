<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cuan Gaming - Testimoni</title>
<style>
  body {margin:0;font-family:Arial,sans-serif;background:#fff;color:#001f3f;}
  header {display:flex;justify-content:space-between;align-items:center;padding:10px 20px;background:#fff;box-shadow:0 2px 5px rgba(0,0,0,0.1);}
  header img {height:50px;}
  header .buttons button {margin-left:10px;padding:5px 10px;font-size:0.9rem;cursor:pointer;}

  .testi-section {display:flex;flex-wrap:wrap;justify-content:center;margin:20px;}
  .fb-embed, .carousel-container {flex:1 1 300px;margin:10px;}
  iframe {width:100%;border:none;overflow:hidden;}

  .carousel {overflow:hidden;position:relative;background:#f8f8f8;border-radius:10px;padding:10px;}
  .carousel-slide {display:flex;transition:transform 0.6s ease-in-out;}
  .carousel-item {min-width:50%;box-sizing:border-box;padding:10px;text-align:left;background:#fff;margin:5px;border-radius:5px;box-shadow:0 1px 5px rgba(0,0,0,0.1);}

  form {margin-top:15px;display:flex;flex-direction:column;}
  form input, form textarea {margin:5px 0;padding:10px;font-size:1rem;border:1px solid #ccc;border-radius:4px;}
  form button {padding:10px;background:#001f3f;color:#fff;border:none;border-radius:4px;cursor:pointer;transition:background 0.3s;}
  form button:hover {background:#003366;}

  .footer-icons {display:flex;flex-wrap:wrap;justify-content:center;margin:20px 0;}
  .footer-icons .func-btn {width:240px;height:240px;margin:10px;text-align:center;cursor:pointer;transition:transform 0.2s;}
  .footer-icons .func-btn img {width:240px;height:240px;display:block;margin:0 auto;}
  .footer-icons .func-btn span {display:block;margin-top:5px;font-weight:bold;color:#001f3f;}
  .footer-icons .func-btn:hover {transform:scale(1.05);}

  @media (max-width:768px){
    .testi-section {flex-direction:column;}
    .carousel-item {min-width:100%;}
    .footer-icons {flex-direction:row;justify-content:space-around;}
    .footer-icons .func-btn {width:45%;height:auto;}
    .footer-icons .func-btn img {width:100%;height:auto;}
  }
</style>
</head>
<body>

<header>
  <img src="https://raw.githubusercontent.com/cuangaming/funbot/main/Cuan%20Logo%20(1)%20copy%20fit.png" alt="Cuan Gaming">
  <div class="buttons">
    <button>Daftar Reseller</button>
    <button>Hubungi Kami</button>
  </div>
</header>

<div class="testi-section">
  <!-- Facebook embed kiri -->
  <div class="fb-embed">
    <iframe src="https://www.facebook.com/plugins/post.php?href=https%3A%2F%2Fwww.facebook.com%2FCuanGamingPage%2Fposts%2F123456789&show_text=true&width=500" width="100%" height="631" scrolling="no" frameborder="0" allowfullscreen></iframe>
  </div>

  <!-- Carousel + form kanan -->
  <div class="carousel-container">
    <div class="carousel">
      <div class="carousel-slide" id="carouselSlide"></div>
    </div>

    <form id="formTestimoni" onsubmit="tambahTestimoni(); return false;">
      <input type="text" id="nama" placeholder="Nama kamu" required>
      <textarea id="komentar" placeholder="Tulis testimoni" required></textarea>
      <button type="submit">Kirim Testimoni</button>
    </form>
  </div>
</div>

<!-- Footer icon 2 -->
<div class="footer-icons">
  <div class="func-btn"><img src="https://raw.githubusercontent.com/cuangaming/funbot/main/topupgame.png"><span>Topup Game 24/7</span></div>
  <div class="func-btn"><img src="https://raw.githubusercontent.com/cuangaming/funbot/main/ugphone.png"><span>Beli UGPhone</span></div>
</div>

<script>
const carouselSlide = document.getElementById('carouselSlide');
let carouselData = [];
let idx = 0;
let slideInterval;

// Load testimoni dari JSON
function loadCarousel(){
  fetch('https://raw.githubusercontent.com/cuangaming/funbot/main/testimoni.json')
    .then(res => res.json())
    .then(data => {
      carouselData = data;
      carouselSlide.innerHTML = '';
      data.forEach(t => {
        const div = document.createElement('div');
        div.className='carousel-item';
        div.innerHTML=`<strong>${t.nama}</strong><p>${t.komen}</p>`;
        carouselSlide.appendChild(div);
      });
      idx = 0;
      carouselSlide.style.transform = 'translateX(0)';
      startCarousel();
    });
}

// Carousel otomatis dengan smooth transition
function startCarousel(){
  if(slideInterval) clearInterval(slideInterval);
  const totalItems = carouselData.length;
  const itemsPerSlide = window.innerWidth < 768 ? 1 : 2;

  slideInterval = setInterval(()=>{
    idx = (idx + itemsPerSlide) % totalItems;
    const shiftPercent = (100 / totalItems) * idx;
    carouselSlide.style.transform = `translateX(-${shiftPercent}%)`;
  },5000);
}

// Submit testimoni
function tambahTestimoni(){
  const nama = document.getElementById('nama').value.trim();
  const komentar = document.getElementById('komentar').value.trim();
  if(!nama || !komentar){ alert("Isi nama & komentar!"); return; }

  fetch('https://testimoni-xi.vercel.app/tambah-testimoni',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({nama, komen:komentar})
  })
  .then(res=>res.json())
  .then(data=>{
    if(data.success){
      alert(data.message);
      document.getElementById('nama').value='';
      document.getElementById('komentar').value='';
      loadCarousel(); // reload carousel
    } else {
      alert('Gagal menambahkan testimoni!');
    }
  }).catch(err=>{
    console.error(err);
    alert('Terjadi error!');
  });
}

// Jalankan pertama kali
loadCarousel();
window.addEventListener('resize', startCarousel);
</script>

</body>
</html>
