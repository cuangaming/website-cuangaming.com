    gap: 12px;

  }

    color: #fff;
    padding: 12px 20px;
    border-radius: 14px;
    text-align: center;
    font-weight: 600;
    text-decoration: none;
    transition: 0.3s;
  }

  .nav-buttons a:hover {
    transform: scale(1.07);
    box-shadow: 0 6px 12px rgba(0,0,0,0.5);
  }

  /* THREADS SECTION */
  .threads {
    padding: 15px;
  }

  .thread {
    background: #1e1e38;
    padding: 14px 16px;
    border-radius: 10px;
    margin-bottom: 12px;

  .thread:hover {

  }

    margin: 0;

  /* FOOTER */

    }

    }
