<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CuanGaming</title>
  <style>

    /* ===== Body & Typography ===== */
    body {
      margin: 0;
      font-family: "Poppins", sans-serif;
      background: #111;
      color: #fff;
    }
    header {
      text-align: center;
      padding: 25px;
      font-size: 2.2em;
      font-weight: 700;
      background: linear-gradient(90deg, #4b1fbe, #2fa8e6);
    }

    /* ===== Container ===== */
    .container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
      padding: 20px;
    }

    /* ===== Button Style Variants ===== */
    .btn {
      display: block;
      text-align: center;
      font-size: 1.1em;
      text-decoration: none;
      padding: 16px;
      font-weight: 600;
      border-radius: 14px;
      color: #fff;
      transition: 0.3s;
    }
    .btn-purple  { background: #8e44ad; }
    .btn-blue    { background: #2980b9; }
    .btn-green   { background: #27ae60; }
    .btn-orange  { background: #e67e22; }
    .btn-red     { background: #c0392b; }
    .btn-pink    { background: #e84393; }

    .btn:hover {
      transform: scale(1.05);
      box-shadow: 0 4px 10px rgba(0,0,0,0.25);
    }

    /* ===== Footer ===== */
    footer {
      text-align: center;
      padding: 14px;
      font-size: 0.9em;
      background: #121212;
      color: #aaa;
    }

  </style>
</head>
<body>

  <header>CuanGaming 🎮</header>

  <div class="container">
    <a href="#" class="btn btn-purple">💰 Topup Game 24/7</a>
    <a href="#" class="btn btn-blue">📱 Beli UGPhone</a>
    <a href="#" class="btn btn-green">🌐 Link Komunitas</a>
    <a href="#" class="btn btn-orange">📺 Channel‑Channel</a>
    <a href="#" class="btn btn-red">✅ Validasi Rekening</a>
    <a href="#" class="btn btn-pink">⚠️ List Penipu</a>
    <a href="#" class="btn btn-blue">📝 Testimoni</a>
    <a href="#" class="btn btn-green">🎓 Edukasi</a>
    <a href="#" class="btn btn-orange">🤝 Daftar Reseller</a>
  </div>

  <footer>© 2025 CuanGaming. All rights reserved.</footer>

</body>
</html>
