<!DOCTYPE html>

<head>

<title>CuanGaming • Forum</title>
<style>
  body {
    margin: 0;
    font-family: "Poppins", sans-serif;
    background: #ffffff; /* Background putih */
    color: #1a1a3f;
  }

  /* HEADER */
  header {
    background: #ffffff;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 20px;
    border-bottom: 1px solid #ddd;
  }

  header .logo img {
    height: 48px;
    width: auto;
  }

  header .header-buttons {
    display: flex;
    gap: 12px;
  }

  .header-buttons a {
    background: #1a1a3f; /* Monochrome dark */
    padding: 8px 16px;
    border-radius: 12px;
    color: #fff;
    font-weight: 600;
    text-decoration: none;
    transition: 0.3s;
  }

  .header-buttons a:hover {
    transform: scale(1.05);
    background: #333366;
  }

  /* HERO FULL WIDTH */
  .hero {
    width: 100%;
    height: 400px;
    background: url("https://raw.githubusercontent.com/cuangaming/funbot/230c0e3ea04a0eae80e0d416a03f562ad693fe1e/rox.jpg") center/cover no-repeat;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    position: relative;
  }

  .hero h2 {
    font-size: 2.6em;
    font-weight: bold;
    color: #001f4d;
    text-shadow: 1px 1px 4px rgba(0,0,0,0.4);
    transform: translateY(-30%);
  }

  /* FEATURE BUTTONS MONOCHROME 3 BARIS */
  .feature-cards {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
    padding: 25px;
  }

  .feature-card {
    background: #1a1a3f; /* Monochrome dark */
    color: #fff;
    border-radius: 10px;
    padding: 20px;
    text-align: center;
    font-weight: 600;
    text-decoration: none;
    transition: 0.3s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .feature-card:hover {
    background: #333366;
    transform: scale(1.05);
  }

  /* THREADS SECTION */
  .threads {
    padding: 15px;
  }

  .thread {
    background: #f5f5f5;
    padding: 14px 16px;
    border-radius: 10px;
    margin-bottom: 12px;
    border: 1px solid #ddd;
    transition: 0.2s;
  }

  .thread:hover {
    background: #eaeaea;
  }

  .thread h3 {
    margin: 0;
    font-size: 1.15em;
    color: #001f4d;
  }

  .thread p {
    margin: 4px 0 0;
    font-size: 0.9em;
    color: #555;
  }

  /* FOOTER */
  footer {
    text-align: center;
    padding: 12px;
    font-size: 0.85em;
    background: #f0f0f0;
    color: #777;
    border-top: 1px solid #ddd;
  }

  /* RESPONSIVE */
  @media(max-width: 900px) {
    .feature-cards {
      grid-template-columns: repeat(2, 1fr);
    }
  }

  @media(max-width: 600px) {
    header {
      flex-direction: column;
      align-items: flex-start;
      gap: 8px;
    }
    header .header-buttons {
      width: 100%;
      justify-content: space-between;
    }

    .feature-cards {
      grid-template-columns: 1fr;
    }

    .hero h2 {
      font-size: 1.8em;
    }
  }
</style>
</head>
