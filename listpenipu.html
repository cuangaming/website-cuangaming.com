<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lapor & Cek Penipu | CuanGaming</title>

<style>
*{box-sizing:border-box}
body{margin:0;font-family:Arial,sans-serif;background:#0f172a;color:#e5e7eb;padding:16px}
h1,h2{margin-bottom:10px}
p{font-size:14px;color:#cbd5f5}
input,textarea,button{
  width:100%;padding:12px;margin-bottom:10px;
  border-radius:8px;border:none;font-size:14px
}
textarea{min-height:100px}
button{background:#38bdf8;color:#020617;font-weight:bold;cursor:pointer}
button:hover{opacity:.9}
.section{margin-bottom:32px}
.search-box input{margin-bottom:16px}
.table-wrapper{overflow-x:auto}
table{width:100%;min-width:900px;border-collapse:collapse;background:#020617}
th,td{padding:10px;border-bottom:1px solid #1e293b;font-size:13px;text-align:left}
th{color:#38bdf8}
.link{color:#38bdf8;cursor:pointer;text-decoration:underline}

/* MODAL */
.modal{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.85);
  justify-content:center;align-items:center;
  padding:16px
}
.modal-content{
  background:#020617;
  padding:16px;border-radius:10px;
  max-width:600px;width:100%;
  max-height:90vh;overflow:auto
}
.close{float:right;font-size:18px;color:#f87171;cursor:pointer}

@media(max-width:768px){
  table{min-width:100%}
  h1{font-size:20px}
}
</style>
</head>

<body>

<h1>🚨 Lapor & Cek Penipu</h1>
<p>Isi laporan dan gunakan pencarian untuk menghindari penipuan.</p>

<!-- FORM -->
<div class="section">
<h2>📝 Form Lapor Penipu</h2>
<form id="laporForm">
  <input type="text" id="nomor_hp" placeholder="Nomor HP" required>
  <input type="text" id="rekening" placeholder="Rekening / E-Wallet" required>
  <input type="text" id="nama_akun" placeholder="Nama Akun (WA / Telegram / IG)" required>
  <input type="text" id="nama_rekening" placeholder="Nama Pemilik Rekening" required>
  <textarea id="kronologi" placeholder="Kronologi kejadian" required></textarea>
  <button type="submit">Kirim Laporan</button>
</form>
</div>

<!-- SEARCH + LIST -->
<div class="section">
<h2>🔍 Cari & Lihat Laporan</h2>

<div class="search-box">
  <input type="text" id="searchInput" placeholder="Cari nomor HP, rekening, nama akun, atau kronologi...">
</div>

<div class="table-wrapper">
<table>
<thead>
<tr>
  <th>No</th>
  <th>Nomor HP</th>
  <th>Rekening</th>
  <th>Nama Akun</th>
  <th>Nama Rekening</th>
  <th>Kronologi</th>
</tr>
</thead>
<tbody id="penipuList"></tbody>
</table>
</div>
</div>

<!-- MODAL KRONOLOGI -->
<div class="modal" id="detailModal">
  <div class="modal-content">
    <span class="close" onclick="closeModal()">✖</span>
    <h3>Detail Kronologi</h3>
    <p id="detailText"></p>
  </div>
</div>

<script>
let dataPenipu = JSON.parse(localStorage.getItem("dataPenipu")) || [];

function renderTable(){
  const tbody = document.getElementById("penipuList");
  tbody.innerHTML = "";
  dataPenipu.forEach((item,index)=>{
    const ringkas = item.kronologi.length > 40
      ? item.kronologi.substring(0,40) + "..."
      : item.kronologi;

    tbody.innerHTML += `
      <tr>
        <td>${index+1}</td>
        <td>${item.nomor_hp}</td>
        <td>${item.rekening}</td>
        <td>${item.nama_akun}</td>
        <td>${item.nama_rekening}</td>
        <td><span class="link" onclick="openModal('${item.kronologi.replace(/'/g,"")}')">Lihat</span></td>
      </tr>
    `;
  });
}

// SEARCH
document.getElementById("searchInput").addEventListener("keyup",function(){
  const filter = this.value.toLowerCase();
  document.querySelectorAll("#penipuList tr").forEach(row=>{
    row.style.display = row.innerText.toLowerCase().includes(filter) ? "" : "none";
  });
});

// MODAL
function openModal(text){
  document.getElementById("detailText").innerText = text;
  document.getElementById("detailModal").style.display = "flex";
}
function closeModal(){
  document.getElementById("detailModal").style.display = "none";
}

// SUBMIT
document.getElementById("laporForm").addEventListener("submit",function(e){
  e.preventDefault();

  const laporan = {
    nomor_hp: nomor_hp.value.trim(),
    rekening: rekening.value.trim(),
    nama_akun: nama_akun.value.trim(),
    nama_rekening: nama_rekening.value.trim(),
    kronologi: kronologi.value.trim(),
    created_at: new Date().toISOString()
  };

  dataPenipu.push(laporan);
  localStorage.setItem("dataPenipu", JSON.stringify(dataPenipu));

  this.reset();
  renderTable();
  alert("Laporan berhasil disimpan");
});

renderTable();
</script>

</body>
</html>
